services:
  postgres:
    image: postgres:15
    container_name: pet-app-postgres
    environment:
      POSTGRES_DB: local
      POSTGRES_USER: petapp
      POSTGRES_PASSWORD: petapp123
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pet-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petapp -d local"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:11
    container_name: pet-app-flyway
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/local
      FLYWAY_USER: petapp
      FLYWAY_PASSWORD: petapp123
      FLYWAY_SCHEMAS: petapp
      FLYWAY_DEFAULT_SCHEMA: petapp
    volumes:
      - ./back/db/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pet-app-network

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: pet-app-backend
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      R2DBC_URL: r2dbc:postgresql://postgres:5432/local?currentSchema=petapp
      R2DBC_USERNAME: petapp
      R2DBC_PASSWORD: petapp123
      ALLOWED_ORIGINS: http://localhost:3000
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-local}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-local}
    depends_on:
      flyway:
        condition: service_completed_successfully
    networks:
      - pet-app-network

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: pet-app-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pet-app-network

networks:
  pet-app-network:
    driver: bridge

volumes:
  postgres-data:
